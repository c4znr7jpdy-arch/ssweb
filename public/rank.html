<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贡献榜｜盛世</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css?v=202607106">
  <style>
    :root {
      --ink: #101210;
      --ink-panel: rgba(13, 15, 14, .82);
      --ink-soft: rgba(22, 25, 23, .66);
      --paper: #e8e1d3;
      --paper-muted: rgba(232, 225, 211, .56);
      --bronze: #c89650;
      --jade: #7e9d95;
      --vermillion: #a44e43;
      --hairline: rgba(232, 225, 211, .14);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--paper);
      background: #090b0a;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(90deg, rgba(7, 8, 7, .96), rgba(7, 8, 7, .72) 42%, rgba(7, 8, 7, .42)),
        linear-gradient(180deg, rgba(7, 8, 7, .26), rgba(7, 8, 7, .92)),
        url('/images/banner3.webp') center/cover;
      filter: grayscale(.78) contrast(1.06) brightness(.72);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: .28;
      background-image: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.018) 4px);
      mask-image: linear-gradient(90deg, #000, transparent 76%);
    }

    .nav {
      background: linear-gradient(180deg, rgba(8,10,9,.92), rgba(8,10,9,.3), transparent);
      border-bottom-color: rgba(200,150,80,.14);
    }
    .nav-logo { color: var(--bronze); text-shadow: none; }
    .nav-links a:hover,
    .nav-links a.active { color: var(--bronze); }

    .rank-page {
      width: min(1500px, calc(100vw - 72px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 108px 0 48px;
    }

    .hud-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 32px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(200,150,80,.36);
    }

    .heading-mark { display: flex; align-items: center; gap: 18px; }
    .heading-diamond {
      width: 14px;
      height: 14px;
      border: 1px solid var(--bronze);
      transform: rotate(45deg);
      box-shadow: inset 0 0 0 3px rgba(200,150,80,.12);
    }
    .eyebrow {
      color: var(--bronze);
      font-size: 11px;
      letter-spacing: 7px;
      margin-bottom: 8px;
    }
    .hud-heading h1 {
      color: var(--paper);
      font-size: clamp(38px, 4.6vw, 70px);
      line-height: 1;
      letter-spacing: 10px;
      text-shadow: 0 12px 40px rgba(0,0,0,.72);
    }
    .heading-meta {
      color: var(--paper-muted);
      font-size: 12px;
      letter-spacing: 3px;
      line-height: 1.9;
      text-align: right;
    }

    .rank-screen {
      display: grid;
      grid-template-columns: minmax(360px, .78fr) minmax(620px, 1.22fr);
      gap: clamp(34px, 5vw, 88px);
      padding-top: 34px;
    }

    .rank-stage { min-width: 0; }
    .section-caption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 42px;
      padding: 0 16px;
      color: var(--paper);
      background: linear-gradient(90deg, rgba(126,157,149,.48), rgba(126,157,149,.12));
      border-left: 2px solid var(--jade);
      font-size: 14px;
      letter-spacing: 4px;
    }
    .section-caption small {
      color: rgba(232,225,211,.5);
      font: 11px/1 var(--font-body);
      letter-spacing: 2px;
    }

    .tab-bar {
      display: flex;
      gap: 30px;
      padding: 22px 4px 15px;
      border-bottom: 1px solid var(--hairline);
    }
    .tab-btn {
      position: relative;
      padding: 0 0 10px;
      border: 0;
      border-radius: 0;
      background: none;
      color: var(--paper-muted);
      font-family: inherit;
      font-size: 14px;
      letter-spacing: 4px;
      cursor: pointer;
    }
    .tab-btn::after {
      content: "";
      position: absolute;
      left: 0;
      right: 100%;
      bottom: 0;
      height: 1px;
      background: var(--bronze);
      transition: right .22s ease;
    }
    .tab-btn:hover,
    .tab-btn.active { color: var(--bronze); }
    .tab-btn.active::after { right: 0; }

    .champion {
      position: relative;
      min-height: 310px;
      margin-top: 22px;
      overflow: hidden;
      border-left: 1px solid rgba(200,150,80,.42);
      background: linear-gradient(110deg, rgba(17,19,17,.94), rgba(17,19,17,.34));
    }
    .champion::after {
      content: "首席";
      position: absolute;
      right: -12px;
      bottom: -28px;
      color: rgba(232,225,211,.035);
      font: 96px/1 var(--font-display);
      letter-spacing: 12px;
    }
    .champion-orbit {
      position: absolute;
      left: 34px;
      top: 34px;
      width: 174px;
      height: 224px;
      border: 1px solid rgba(232,225,211,.16);
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 0 100%);
    }
    .champion-avatar {
      position: absolute;
      left: 44px;
      top: 44px;
      width: 154px;
      height: 204px;
      object-fit: cover;
      filter: grayscale(.58) contrast(1.08);
    }
    .champion-rank {
      position: absolute;
      left: 18px;
      top: 12px;
      z-index: 2;
      color: var(--bronze);
      font: 46px/1 var(--font-display);
    }
    .champion-info {
      position: absolute;
      left: 226px;
      right: 22px;
      top: 76px;
      z-index: 2;
    }
    .champion-name {
      color: var(--paper);
      font-size: 26px;
      letter-spacing: 5px;
      margin-bottom: 12px;
    }
    .champion-meta {
      min-height: 48px;
      color: var(--paper-muted);
      font-size: 12px;
      line-height: 1.9;
    }
    .champion-score {
      margin-top: 18px;
      color: var(--bronze);
      font: 44px/1 var(--font-display);
      font-variant-numeric: tabular-nums;
    }
    .champion-score::after {
      content: " 贡献";
      color: var(--paper-muted);
      font: 11px/1 var(--font-body);
      letter-spacing: 2px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--hairline);
      border-bottom: 1px solid var(--hairline);
    }
    .stat-card {
      padding: 18px 14px;
      border-right: 1px solid var(--hairline);
    }
    .stat-card:last-child { border-right: 0; }
    .stat-card .value {
      color: var(--paper);
      font-size: 22px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .stat-card .label {
      margin-top: 9px;
      color: var(--paper-muted);
      font-size: 10px;
      letter-spacing: 2px;
    }

    .rank-flow {
      align-self: start;
      background: var(--ink-panel);
      border-top: 1px solid rgba(200,150,80,.5);
      box-shadow: 0 28px 80px rgba(0,0,0,.28);
      backdrop-filter: blur(14px);
    }
    .board-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 54px;
      padding: 0 22px;
      color: var(--paper);
      background: rgba(6,7,6,.76);
      font-size: 18px;
      letter-spacing: 5px;
    }
    .board-title span:last-child {
      color: var(--paper-muted);
      font: 11px/1 var(--font-body);
      letter-spacing: 2px;
    }
    .board-head {
      display: grid;
      grid-template-columns: 58px 54px 1fr 130px;
      gap: 14px;
      padding: 13px 22px;
      color: rgba(232,225,211,.38);
      font-size: 10px;
      letter-spacing: 3px;
      border-bottom: 1px solid var(--hairline);
    }
    .board-head span:last-child { text-align: right; }

    .rank-list { padding: 7px 0 12px; }
    .rank-item {
      --progress: 0%;
      position: relative;
      display: grid;
      grid-template-columns: 58px 54px 1fr 130px;
      gap: 14px;
      align-items: center;
      min-height: 72px;
      padding: 8px 22px;
      overflow: hidden;
      border-bottom: 1px solid rgba(232,225,211,.08);
      transition: background .2s ease, transform .2s ease;
    }
    .rank-item::before {
      content: "";
      position: absolute;
      inset: 7px auto 7px 0;
      width: var(--progress);
      z-index: -1;
      background: linear-gradient(90deg, rgba(126,157,149,.22), rgba(126,157,149,.035));
      border-left: 2px solid rgba(126,157,149,.65);
    }
    .rank-item:hover {
      background: rgba(232,225,211,.045);
      transform: translateX(-3px);
    }
    .rank-item[data-rank="1"]::before {
      background: linear-gradient(90deg, rgba(200,150,80,.28), rgba(200,150,80,.04));
      border-left-color: var(--bronze);
    }
    .rank-num {
      color: var(--paper-muted);
      font: 25px/1 var(--font-display);
      text-align: center;
    }
    .rank-item[data-rank="1"] .rank-num { color: var(--bronze); }
    .rank-avatar {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 0;
      filter: grayscale(.5);
      border: 1px solid rgba(232,225,211,.2);
    }
    .rank-name { color: var(--paper); font-size: 15px; letter-spacing: 2px; }
    .rank-role { margin-left: 10px; color: var(--bronze); font-size: 10px; }
    .rank-reason {
      margin-top: 5px;
      color: rgba(232,225,211,.42);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rank-points {
      color: var(--paper);
      font-size: 20px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .rank-item[data-rank="1"] .rank-points { color: var(--bronze); }

    .energy-lane { display: none; }

    @media (max-width: 980px) {
      .rank-page { width: min(100vw - 28px, 760px); padding-top: 92px; }
      .hud-heading { align-items: start; flex-direction: column; }
      .heading-meta { text-align: left; }
      .rank-screen { grid-template-columns: 1fr; gap: 34px; }
      .board-head { display: none; }
    }

    @media (max-width: 620px) {
      .hud-heading h1 { font-size: 42px; letter-spacing: 6px; }
      .champion { min-height: 286px; }
      .champion-orbit { width: 132px; height: 194px; }
      .champion-avatar { width: 112px; height: 174px; }
      .champion-info { left: 176px; top: 64px; }
      .champion-name { font-size: 20px; }
      .champion-score { font-size: 34px; }
      .stats-row { grid-template-columns: 1fr; }
      .stat-card { border-right: 0; border-bottom: 1px solid var(--hairline); }
      .rank-item { grid-template-columns: 34px 40px 1fr 72px; gap: 9px; padding: 8px 12px; }
      .rank-avatar { width: 36px; height: 36px; }
      .rank-role { display: block; margin: 4px 0 0; }
      .rank-points { font-size: 16px; }
    }
  </style>
  <link rel="stylesheet" href="/css/theme.css?v=2026071102">
  <link rel="stylesheet" href="/css/site-nav.css?v=202607211">
</head>
<body class="rank-page-body">
  <nav class="nav">
    <a href="/" class="nav-logo">盛世</a>
    <div class="nav-links">
      <a href="/">主页</a>
      <a href="/members.html">成员</a>
      <a href="/calendar.html">活动日历</a>
      <a href="/rank.html" class="active">贡献榜</a>
      <a href="/tools/yysls/" target="_blank">装备工具</a>
    </div>
  </nav>

  <main class="rank-page">
    <header class="hud-heading">
      <div class="heading-mark">
        <span class="heading-diamond"></span>
        <div>
          <div class="eyebrow">SHENGSHI FIELD RECORD</div>
          <h1>百业贡献榜</h1>
        </div>
      </div>
      <div class="heading-meta">社内战备记录<br>活跃 · 组织 · 带新 · 副本</div>
    </header>

    <section class="rank-screen">
      <aside class="rank-stage">
        <div class="section-caption">
          <span>战备总览</span>
          <small>CONTRIBUTION ARCHIVE</small>
        </div>
        <div class="tab-bar" id="tabBar">
          <button class="tab-btn active" data-type="total">总榜</button>
          <button class="tab-btn" data-type="month">月榜</button>
          <button class="tab-btn" data-type="week">周榜</button>
        </div>
        <div class="champion" id="champion"></div>
        <div class="stats-row" id="statsRow"></div>
      </aside>

      <section class="rank-flow">
        <div class="board-title">
          <span>贡献总量</span>
          <span>实时档案</span>
        </div>
        <div class="board-head">
          <span>序</span>
          <span>肖像</span>
          <span>成员 / 最近贡献</span>
          <span>贡献值</span>
        </div>
        <div class="rank-list" id="rankList"></div>
      </section>
    </section>
    <div class="energy-lane" id="energyLane"></div>
  </main>

  <script src="/js/site-nav.js?v=202607211"></script>
  <script src="/js/rank.js?v=202607103"></script>
</body>
</html>
