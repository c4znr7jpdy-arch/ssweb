<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百业成员 - 盛世</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .page-header {
      text-align: center;
      padding: 120px 20px 40px;
    }
    .page-header h1 {
      font-size: 36px;
      letter-spacing: 8px;
      margin-bottom: 12px;
    }
    .page-header .subtitle {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 4px;
    }

    .filter-bar {
      display: flex; justify-content: center; gap: 12px;
      padding: 20px; flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent; border: 1px solid rgba(201,169,110,0.2);
      color: var(--muted); padding: 8px 20px; border-radius: 30px;
      cursor: pointer; font-size: 13px; letter-spacing: 2px;
      transition: all 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--gold); color: var(--bg); border-color: var(--gold);
    }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      padding: 20px 40px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .member-card {
      background: var(--panel);
      border: 1px solid rgba(201,169,110,0.16);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }
    .member-card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,169,110,0.45);
      box-shadow: 0 24px 70px rgba(0,0,0,0.55);
    }

    .member-avatar {
      width: 100%; height: 300px;
      object-fit: cover;
      display: block;
    }

    .member-info {
      padding: 20px;
    }
    .member-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px; color: #fff;
      letter-spacing: 4px; margin-bottom: 8px;
    }
    .member-role {
      font-size: 12px; color: var(--gold);
      letter-spacing: 2px; margin-bottom: 10px;
    }
    .member-tags {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .member-tag {
      font-size: 11px; color: var(--muted);
      background: rgba(201,169,110,0.1);
      padding: 3px 10px; border-radius: 12px;
    }
    .member-signature {
      font-size: 13px; color: rgba(255,255,255,0.5);
      font-style: italic;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">盛世</a>
    <div class="nav-links">
      <a href="/">主页</a>
      <a href="/members.html" class="active">成员</a>
      <a href="/calendar.html">活动日历</a>
      <a href="/rank.html">贡献榜</a>
      <a href="/tools/yysls/" target="_blank">装备工具</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>盛世成员</h1>
    <div class="subtitle">江湖同路，皆为此间人</div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-role="">全部</button>
    <button class="filter-btn" data-role="社主">社主</button>
    <button class="filter-btn" data-role="副社">副社</button>
    <button class="filter-btn" data-role="管理">管理</button>
    <button class="filter-btn" data-role="核心成员">核心成员</button>
    <button class="filter-btn" data-role="普通成员">普通成员</button>
  </div>

  <div class="members-grid" id="membersGrid"></div>

  <script src="/js/members.js"></script>
</body>
</html>
