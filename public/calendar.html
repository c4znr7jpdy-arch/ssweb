<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活动日历 - 盛世</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css?v=202607106">
  <style>
    body.calendar-page { overflow-x: hidden; }

    .calendar-shell {
      width: min(1320px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 104px 0 72px;
    }

    .calendar-hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, .85fr);
      gap: 34px;
      align-items: end;
      min-height: 360px;
      margin-bottom: 46px;
    }

    .calendar-hero::before {
      content: "";
      position: absolute;
      inset: -70px -90px auto -90px;
      height: 460px;
      pointer-events: none;
      background:
        radial-gradient(circle at 28% 40%, rgba(0,229,255,.26), transparent 34%),
        radial-gradient(circle at 78% 10%, rgba(139,92,246,.22), transparent 30%),
        linear-gradient(120deg, rgba(0,229,255,.08), transparent 48%);
      filter: blur(4px);
      opacity: .92;
    }

    .hero-copy,
    .signup-console,
    .calendar-panel,
    .day-panel {
      position: relative;
      z-index: 1;
    }

    .hero-copy { padding: 20px 0 28px; }

    .eyebrow {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .hero-copy h1 {
      font-size: clamp(64px, 9vw, 132px);
      line-height: .82;
      letter-spacing: 10px;
      margin-bottom: 24px;
      text-shadow: 0 0 34px rgba(0,229,255,.35);
    }

    .hero-copy p {
      width: min(640px, 100%);
      color: rgba(233,248,255,.72);
      font-size: 15px;
      line-height: 1.95;
      letter-spacing: 1px;
    }

    .signup-console {
      padding: 10px 0 18px;
      isolation: isolate;
    }

    .signup-console::before {
      content: "";
      position: absolute;
      inset: -26px -18px -22px -18px;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(0,229,255,.18), transparent 58%),
        radial-gradient(circle at 76% 0%, rgba(0,229,255,.18), transparent 36%);
      mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
    }

    .console-title h2 {
      font-size: 32px;
      letter-spacing: 5px;
      margin-bottom: 6px;
    }

    .console-title span {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .signup-form {
      display: grid;
      gap: 22px;
      margin-top: 28px;
    }

    .identity-line {
      display: flex;
      align-items: end;
      gap: 12px;
      color: rgba(233,248,255,.72);
      font-size: 16px;
      letter-spacing: 2px;
    }

    .identity-line input {
      flex: 1;
      min-width: 0;
      border: 0;
      border-bottom: 1px solid rgba(0,229,255,.42);
      background: transparent;
      color: #fff;
      outline: none;
      padding: 10px 2px 8px;
      font-size: 22px;
      letter-spacing: 1px;
    }

    .identity-line input:focus {
      border-bottom-color: var(--gold);
      box-shadow: 0 12px 24px -22px var(--gold);
    }

    .activity-picker {
      display: grid;
      gap: 12px;
    }

    .picker-label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .activity-stream {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
      min-height: 112px;
    }

    .activity-node {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(232,225,211,.16);
      background: linear-gradient(135deg, rgba(18,20,18,.9), rgba(7,9,8,.82));
      color: rgba(233,248,255,.72);
      cursor: pointer;
      min-width: 0;
      padding: 16px 18px 17px;
      font: inherit;
      text-align: left;
      transition: color .2s, transform .2s, border-color .2s, background .2s, box-shadow .2s;
    }

    .activity-node::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: rgba(126,157,149,.42);
      transition: width .2s, background .2s;
    }

    .activity-node::after {
      content: "";
      position: absolute;
      left: 0;
      right: 42%;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      opacity: 0;
      transition: opacity .2s;
    }

    .activity-node:hover,
    .activity-node.active {
      color: #fff;
      transform: translateY(-2px);
    }

    .activity-node:hover {
      border-color: rgba(200,150,80,.38);
    }

    .activity-node.active {
      border-color: rgba(200,150,80,.74);
      background:
        linear-gradient(135deg, rgba(200,150,80,.12), transparent 55%),
        linear-gradient(135deg, rgba(18,20,18,.96), rgba(7,9,8,.9));
      box-shadow: 0 16px 34px rgba(0,0,0,.22), inset 0 0 0 1px rgba(200,150,80,.08);
    }

    .activity-node.active::before {
      background: var(--gold);
      width: 4px;
      box-shadow: 0 0 22px rgba(200,150,80,.45);
    }

    .activity-node.active::after { opacity: 1; }

    .activity-node-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .activity-node-type,
    .activity-node-state {
      font-size: 11px;
      line-height: 1;
      letter-spacing: 2px;
    }

    .activity-node-type {
      color: var(--gold);
    }

    .activity-node-state {
      color: rgba(232,225,211,.46);
    }

    .activity-node.active .activity-node-state {
      color: var(--gold);
    }

    .activity-node-title {
      display: block;
      overflow: hidden;
      color: var(--paper);
      font-family: var(--font-body);
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 2px;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 15px;
    }

    .activity-node-meta {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(64px, .7fr) minmax(58px, .55fr);
      border-top: 1px solid rgba(232,225,211,.1);
      padding-top: 12px;
    }

    .activity-node-meta span {
      min-width: 0;
      padding: 0 10px;
      border-left: 1px solid rgba(232,225,211,.1);
      color: rgba(232,225,211,.78);
      font-size: 13px;
      line-height: 1.35;
      letter-spacing: .5px;
    }

    .activity-node-meta span:first-child {
      padding-left: 0;
      border-left: 0;
    }

    .activity-node-meta small {
      display: block;
      margin-bottom: 5px;
      color: rgba(232,225,211,.4);
      font-size: 10px;
      letter-spacing: 2px;
    }

    .signup-action {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .signup-message {
      flex: 1;
      min-height: 24px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .signup-message.success { color: #65f6d2; }
    .signup-message.error { color: #ff7aa2; }

    .signal-button {
      border: 0;
      border-radius: 999px;
      background: var(--gold);
      color: var(--bg);
      cursor: pointer;
      min-width: 150px;
      padding: 13px 24px;
      font-weight: 700;
      letter-spacing: 2px;
      box-shadow: 0 0 34px rgba(0,229,255,.28);
      transition: transform .2s, box-shadow .2s;
    }

    .signal-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 44px rgba(0,229,255,.48);
    }

    .signal-button:disabled {
      cursor: not-allowed;
      opacity: .45;
      transform: none;
      box-shadow: none;
    }

    .calendar-board {
      display: grid;
      grid-template-columns: minmax(0, 1.48fr) minmax(320px, .86fr);
      gap: 34px;
      align-items: start;
    }

    .calendar-panel,
    .day-panel {
      background: rgba(4,12,24,.42);
      backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(0,229,255,.08);
    }

    .calendar-panel { padding: 24px 0 0; }
    .day-panel { min-height: 520px; padding: 24px 0 0 10px; }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .month-title {
      font-family: var(--font-display);
      color: var(--gold);
      font-size: 32px;
      letter-spacing: 6px;
      text-align: center;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      background: rgba(0,229,255,.08);
      color: var(--gold);
      cursor: pointer;
      font-size: 24px;
    }

    .icon-btn:hover { background: var(--gold); color: var(--bg); }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .cal-header {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
      text-align: center;
      padding: 4px 0 10px;
    }

    .cal-day {
      min-height: 100px;
      border: 0;
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(9,22,40,.44), rgba(3,8,18,.16));
      color: inherit;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      font: inherit;
      transition: transform .2s, background .2s;
    }

    .cal-day:hover,
    .cal-day.selected {
      transform: translateY(-2px);
      background: linear-gradient(180deg, rgba(0,229,255,.15), rgba(3,8,18,.24));
    }

    .cal-day.today { box-shadow: inset 0 -2px 0 rgba(0,229,255,.76); }
    .cal-day.other-month { opacity: .28; cursor: default; }

    .cal-day-num {
      color: rgba(233,248,255,.9);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .day-events { display: grid; gap: 5px; }

    .mini-event {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--gold);
      font-size: 12px;
      line-height: 1.5;
    }

    .side-title {
      font-family: var(--font-display);
      color: var(--gold);
      font-size: 26px;
      letter-spacing: 4px;
      margin-bottom: 18px;
    }

    .event-list { display: grid; gap: 16px; }

    .event-card {
      position: relative;
      padding: 16px 0 18px 22px;
    }

    .event-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 20px;
      bottom: 20px;
      width: 2px;
      background: linear-gradient(var(--gold), transparent);
    }

    .event-card-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .event-time { color: var(--gold); font-size: 12px; letter-spacing: 2px; }
    .event-title { color: #fff; font-weight: 700; margin: 5px 0; }
    .event-meta { color: var(--muted); font-size: 12px; line-height: 1.6; }

    .member-count {
      color: var(--gold);
      font-family: var(--font-display);
      font-size: 32px;
      white-space: nowrap;
    }

    .roster {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .roster span {
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(0,229,255,.08);
      color: rgba(233,248,255,.82);
      font-size: 12px;
    }

    .event-detail-link {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      margin-top: 16px;
      padding: 0 18px;
      border: 1px solid rgba(200,150,80,.38);
      color: var(--gold);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      transition: background .2s, color .2s, border-color .2s;
    }

    .event-detail-link:hover {
      color: #0a0c0a;
      border-color: var(--gold);
      background: var(--gold);
    }

    .empty-state {
      padding: 34px 0;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 960px) {
      .calendar-hero,
      .calendar-board { grid-template-columns: 1fr; }
      .day-panel { min-height: 0; padding-left: 0; }
    }

    @media (max-width: 680px) {
      .calendar-shell {
        width: min(100vw - 24px, 1320px);
        padding-top: 92px;
      }

      .calendar-hero { min-height: 0; }
      .calendar-hero::before { inset: -50px 0 auto; }
      .hero-copy h1 { letter-spacing: 5px; }
      .activity-stream { grid-template-columns: 1fr; }
      .activity-node { padding: 17px 17px 18px; }
      .activity-node-title { font-size: 28px; margin-bottom: 16px; }
      .activity-node-meta span { font-size: 13px; padding: 0 8px; }
      .signup-action { display: grid; }
      .signal-button { width: 100%; }
      .calendar-grid { gap: 5px; }
      .cal-day { min-height: 72px; padding: 7px; }
      .mini-event { font-size: 10px; }
    }
  </style>
  <link rel="stylesheet" href="/css/theme.css?v=202607207">
  <link rel="stylesheet" href="/css/site-nav.css?v=202607211">
</head>
<body class="calendar-page">
  <nav class="nav">
    <a href="/" class="nav-logo">盛世</a>
    <div class="nav-links">
      <a href="/">主页</a>
      <a href="/members.html">成员</a>
      <a href="/calendar.html" class="active">活动日历</a>
      <a href="/rank.html">贡献榜</a>
      <a href="/tools/yysls/" target="_blank">装备工具</a>
    </div>
  </nav>

  <main class="calendar-shell">
    <section class="calendar-board">
      <aside class="day-panel">
        <div class="side-title" id="sideTitle">今日活动</div>
        <div id="eventList" class="event-list"></div>
      </aside>

      <div class="calendar-panel">
        <div class="month-nav">
          <button id="prevMonth" class="icon-btn" type="button" aria-label="上个月">‹</button>
          <div class="month-title" id="monthTitle"></div>
          <button id="nextMonth" class="icon-btn" type="button" aria-label="下个月">›</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
    </section>
  </main>

  <script src="/js/site-nav.js?v=202607211"></script>
  <script src="/js/calendar.js?v=202607205"></script>
</body>
</html>
