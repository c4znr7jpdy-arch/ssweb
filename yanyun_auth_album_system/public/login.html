<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录｜盛世</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="topbar">
    <a href="/" class="brand">盛世</a>
    <nav class="nav" id="userBox">
      <a href="/register.html">注册</a>
    </nav>
  </header>

  <main class="auth-wrap">
    <form class="panel auth-card" id="loginForm">
      <div class="auth-title">MEMBER LOGIN</div>
      <h1>登录</h1>

      <div class="field">
        <label for="username">账号</label>
        <input id="username" autocomplete="username" placeholder="请输入账号" />
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
      </div>

      <button class="btn btn-primary" type="submit">登录</button>
      <div class="message" id="message"></div>

      <p class="auth-link">没有账号？<a href="/register.html">去注册</a></p>
      <p class="auth-link">默认管理员：admin / abc123</p>
    </form>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
