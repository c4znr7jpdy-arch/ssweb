<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上传相册｜盛世</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="topbar">
    <a href="/" class="brand">盛世</a>
    <nav class="nav">
      <a href="/">主页</a>
      <a href="/members.html">成员</a>
      <a href="/album.html">成员相册</a>
      <a class="active" href="/album-upload.html">上传图片</a>
      <span id="userBox"></span>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <div>
        <div class="kicker">MEMBER GALLERY UPLOAD</div>
        <h1>上传相册</h1>
        <p class="sub">登录后才能上传。原图不能超过 10M；上传后服务端自动压缩到 1M 以下。</p>
      </div>

      <div class="panel hero-card">
        <strong>权限规则</strong>
        <p>普通成员只能上传到自己的相册。管理员可以帮所有成员上传。图片会保存到服务器本地目录。</p>
      </div>
    </section>

    <section class="upload-layout">
      <label class="panel drop-zone" id="dropZone">
        <input class="file-input" id="imageInput" type="file" accept="image/jpeg,image/png,image/webp" />

        <div class="drop-inner" id="dropInner">
          <div class="upload-icon"><span>＋</span></div>
          <div class="drop-title">选择图片</div>
          <p class="drop-desc">点击选择，或把图片拖到这里。<br>前端和后端都会限制 10M。</p>
        </div>

        <div class="preview" id="preview">
          <img id="previewImg" alt="图片预览" />
        </div>
      </label>

      <aside class="panel upload-form">
        <div class="form-title">PHOTO INFORMATION</div>

        <div class="field">
          <label for="memberId">成员ID</label>
          <input id="memberId" name="memberId" readonly />
        </div>

        <div class="field">
          <label for="nickname">成员昵称</label>
          <input id="nickname" name="nickname" readonly />
        </div>

        <div class="field">
          <label for="title">图片标题</label>
          <input id="title" name="title" placeholder="例如：雪夜执剑" />
        </div>

        <div class="field">
          <label for="category">分类</label>
          <select id="category" name="category">
            <option value="个人">个人</option>
            <option value="活动">活动</option>
            <option value="合照">合照</option>
            <option value="风景">风景</option>
          </select>
        </div>

        <div class="field">
          <label for="description">图片说明</label>
          <textarea id="description" name="description" placeholder="写一句这张图的故事"></textarea>
        </div>

        <div class="size-box">
          <div class="size-item">
            <span>原图大小</span>
            <strong id="originSize">--</strong>
          </div>
          <div class="size-item">
            <span>压缩后</span>
            <strong id="compressedSize">等待上传</strong>
          </div>
        </div>

        <div class="progress"><i id="progressBar"></i></div>

        <button class="btn btn-primary" id="uploadBtn" type="button">上传到服务器</button>

        <p class="notice">建议正式上线后再加图片审核和删除入口。现在这版默认上传后直接展示。</p>
        <div class="message" id="message"></div>
      </aside>
    </section>
  </main>

  <script src="/js/album-upload.js"></script>
</body>
</html>
