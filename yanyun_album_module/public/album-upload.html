<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上传相册｜盛世</title>
  <link rel="stylesheet" href="/css/album.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="topbar">
    <a href="/" class="brand">盛世</a>
    <nav class="nav">
      <a href="/">主页</a>
      <a href="/members.html">成员</a>
      <a class="active" href="/album.html">成员相册</a>
      <a href="/album-upload.html">上传图片</a>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <div>
        <div class="kicker">MEMBER GALLERY UPLOAD</div>
        <h1>上传相册</h1>
        <p class="sub">支持 JPG / PNG / WEBP，单张原图不能超过 10M。上传后服务端会自动压缩到 1M 以下，并保存为 WEBP。</p>
      </div>

      <div class="hero-card">
        <strong>规则</strong>
        <p>只保存压缩后的图片。建议上传游戏截图、成员定妆照、活动合照。过暗、重复、无关图片建议后台审核后删除。</p>
      </div>
    </section>

    <section class="upload-layout">
      <label class="panel drop-zone" id="dropZone">
        <input class="file-input" id="imageInput" type="file" accept="image/jpeg,image/png,image/webp" />

        <div class="drop-inner" id="dropInner">
          <div class="upload-icon"><span>＋</span></div>
          <div class="drop-title">选择图片</div>
          <p class="drop-desc">点击选择，或把图片拖到这里。<br>前端会先校验 10M，后端也会再次校验。</p>
        </div>

        <div class="preview" id="preview">
          <img id="previewImg" alt="图片预览" />
        </div>
      </label>

      <aside class="panel upload-form">
        <div class="form-title">PHOTO INFORMATION</div>

        <div class="field">
          <label for="memberId">成员ID</label>
          <input id="memberId" name="memberId" value="2" placeholder="例如：2" />
        </div>

        <div class="field">
          <label for="nickname">成员昵称</label>
          <input id="nickname" name="nickname" value="有歌旧酒" placeholder="例如：有歌旧酒" />
        </div>

        <div class="field">
          <label for="title">图片标题</label>
          <input id="title" name="title" placeholder="例如：雪夜执剑" />
        </div>

        <div class="field">
          <label for="category">分类</label>
          <select id="category" name="category">
            <option value="个人">个人</option>
            <option value="活动">活动</option>
            <option value="合照">合照</option>
            <option value="风景">风景</option>
          </select>
        </div>

        <div class="field">
          <label for="description">图片说明</label>
          <textarea id="description" name="description" placeholder="写一句这张图的故事"></textarea>
        </div>

        <div class="size-box">
          <div class="size-item">
            <span>原图大小</span>
            <strong id="originSize">--</strong>
          </div>
          <div class="size-item">
            <span>压缩后</span>
            <strong id="compressedSize">等待上传</strong>
          </div>
        </div>

        <div class="progress"><i id="progressBar"></i></div>

        <button class="btn btn-primary" id="uploadBtn" type="button">上传到服务器</button>

        <p class="notice">安全策略：前端限制 10M；后端使用 multer 再限制 10M；后端使用 sharp 压缩到 1M 以下。</p>
        <div class="message" id="message"></div>
      </aside>
    </section>
  </main>

  <script src="/js/album-upload.js"></script>
</body>
</html>
