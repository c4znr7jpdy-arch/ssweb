<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册｜盛世</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <header class="topbar">
    <a href="/" class="brand">盛世</a>
    <nav class="nav" id="userBox">
      <a href="/login.html">登录</a>
    </nav>
  </header>

  <main class="auth-wrap">
    <form class="panel auth-card" id="registerForm">
      <div class="auth-title">CREATE MEMBER ACCOUNT</div>
      <h1>注册</h1>

      <div class="field">
        <label for="username">账号</label>
        <input id="username" autocomplete="username" placeholder="3-16位英文/数字/下划线" />
      </div>

      <div class="field">
        <label for="nickname">昵称</label>
        <input id="nickname" placeholder="注册后会进入成员列表" />
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="new-password" placeholder="6位英文和数字混合，例如 abc123" />
      </div>

      <button class="btn btn-primary" type="submit">注册并进入成员列表</button>
      <div class="message" id="message"></div>

      <p class="auth-link">已有账号？<a href="/login.html">去登录</a></p>
    </form>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
